<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassy Weather App</title>
    <style>
        /* Base Styling & Background with CSS Variables */
        :root {
            --bg-gradient: linear-gradient(135deg, #1f4068, #162447, #0f1a1c);
            --container-bg: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.25);
            --text-color: #ffffff;
            --text-shadow: rgba(0, 0, 0, 0.3);
            --input-bg: rgba(255, 255, 255, 0.15);
            --input-border: rgba(255, 255, 255, 0.2);
            --input-focus-bg: rgba(255, 255, 255, 0.25);
            --input-focus-border: rgba(255, 255, 255, 0.5);
            --placeholder-color: rgba(255, 255, 255, 0.7);
            --button-bg: rgba(255, 255, 255, 0.25);
            --button-border: rgba(255, 255, 255, 0.3);
            --button-hover-bg: rgba(255, 255, 255, 0.4);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-muted: rgba(255, 255, 255, 0.6);
            --shadow-color: rgba(0, 0, 0, 0.3);
            
            /* Drops styling */
            --drop-bg: rgba(255, 255, 255, 0.1);
            --drop-shadow-inset-1: rgba(0, 0, 0, 0.05);
            --drop-shadow-inset-2: rgba(255, 255, 255, 0.4);
            --drop-shadow-inset-3: rgba(255, 255, 255, 0.6);
            --drop-shadow-out: rgba(0, 0, 0, 0.1);
            --drop-highlight: #ffffff;
            
            --theme-icon-color: #ffffff;
            --glass-blur: 15px;
        }

        /* Solarized Dark Theme */
        body.solarized-dark {
            --bg-gradient: linear-gradient(135deg, #002b36, #073642, #001e26);
            --container-bg: rgba(7, 54, 66, 0.65);
            --border-color: rgba(42, 161, 152, 0.35);
            --text-color: #93a1a1;
            --text-shadow: rgba(0, 0, 0, 0.5);
            --input-bg: rgba(0, 43, 54, 0.4);
            --input-border: rgba(42, 161, 152, 0.25);
            --input-focus-bg: rgba(0, 43, 54, 0.55);
            --input-focus-border: rgba(42, 161, 152, 0.6);
            --placeholder-color: #586e75;
            --button-bg: rgba(42, 161, 152, 0.25);
            --button-border: rgba(42, 161, 152, 0.4);
            --button-hover-bg: rgba(42, 161, 152, 0.4);
            --card-bg: rgba(0, 43, 54, 0.25);
            --card-border: rgba(42, 161, 152, 0.15);
            --text-muted: #657b83;
            --shadow-color: rgba(0, 0, 0, 0.5);
            
            /* Drops styling customized for Solarized */
            --drop-bg: rgba(42, 161, 152, 0.08);
            --drop-shadow-inset-1: rgba(0, 0, 0, 0.15);
            --drop-shadow-inset-2: rgba(42, 161, 152, 0.3);
            --drop-shadow-inset-3: rgba(42, 161, 152, 0.4);
            --drop-shadow-out: rgba(0, 0, 0, 0.2);
            --drop-highlight: #93a1a1;
            
            --theme-icon-color: #2aa198;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
            transition: background 0.5s ease, color 0.5s ease;
        }

        /* Pure CSS Water Drops */
        .drop {
            position: absolute;
            background: var(--drop-bg);
            backdrop-filter: blur(2px);
            border-radius: 50%;
            box-shadow: inset 10px 10px 10px var(--drop-shadow-inset-1),
                        15px 25px 10px var(--drop-shadow-out),
                        inset -10px -10px 10px var(--drop-shadow-inset-2),
                        inset 0 0 10px var(--drop-shadow-inset-3);
            transition: all 0.5s ease;
        }
        .drop::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 12px;
            width: 15px;
            height: 15px;
            background: var(--drop-highlight);
            border-radius: 50%;
            opacity: 0.7;
            transition: all 0.5s ease;
        }
        .drop1 { width: 80px; height: 80px; top: 10%; left: 10%; }
        .drop2 { width: 120px; height: 120px; bottom: 15%; right: 10%; }
        .drop3 { width: 50px; height: 50px; bottom: 20%; left: 15%; }
        .drop4 { width: 60px; height: 60px; top: 15%; right: 20%; }

        /* Glassmorphism Container */
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--container-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            color: var(--text-color);
            box-shadow: 0 8px 32px 0 var(--shadow-color);
            z-index: 10;
            position: relative;
            transition: background-color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 400;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px var(--text-shadow);
            color: var(--text-color);
            transition: color 0.5s ease, text-shadow 0.5s ease;
        }

        /* Theme Toggle Styling */
        .theme-toggle-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .theme-toggle-btn {
            background: var(--button-bg);
            border: 1px solid var(--button-border);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(5px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .theme-toggle-btn:hover {
            background: var(--button-hover-bg);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .theme-toggle-btn:active {
            transform: translateY(0);
        }

        .theme-toggle-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--theme-icon-color);
            transition: transform 0.5s ease, fill 0.5s ease;
        }

        /* Search Section */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 12px 20px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 30px;
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: var(--placeholder-color);
            transition: color 0.5s ease;
        }

        input:focus {
            background: var(--input-focus-bg);
            border-color: var(--input-focus-border);
        }

        button {
            padding: 12px 25px;
            background: var(--button-bg);
            border: 1px solid var(--button-border);
            border-radius: 30px;
            color: var(--text-color);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--button-hover-bg);
            transform: translateY(-2px);
        }

        /* Weather Info Grid */
        .weather-info {
            display: none; /* Hidden by default until data loads */
        }

        .main-details {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 20px;
            transition: border-bottom 0.5s ease;
        }

        .city-name {
            font-size: 28px;
            font-weight: 600;
        }

        .temp {
            font-size: 48px;
            font-weight: 300;
            margin: 10px 0;
        }

        .grid-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .info-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            transition: all 0.5s ease;
        }

        .info-card span {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.5s ease;
        }

        .info-card p {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-color);
            transition: color 0.5s ease;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <script>
        // Inline check to prevent theme flash
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'solarized-dark') {
            document.body.classList.add('solarized-dark');
        }
    </script>

    <div class="drop drop1"></div>
    <div class="drop drop2"></div>
    <div class="drop drop3"></div>
    <div class="drop drop4"></div>

    <div class="container">
        <div class="theme-toggle-container">
            <button id="themeToggleBtn" onclick="toggleTheme()" class="theme-toggle-btn" title="Toggle between Dark and Solarized Dark mode">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
                </svg>
                <span>Dark Mode</span>
            </button>
        </div>
        <h1>SkyGlass Weather</h1>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name...">
            <button onclick="getWeather()">Search</button>
        </div>

        <div class="error" id="errorMsg">City not found. Please try again.</div>

        <div class="weather-info" id="weatherInfo">
            <div class="main-details">
                <div class="city-name" id="location">Delhi, IN</div>
                <div class="temp" id="temperature">--°C</div>
                <p id="currentTime">Time: --:--</p>
            </div>

            <div class="grid-info">
                <div class="info-card">
                    <span>Coordinates</span>
                    <p id="coords">Lat: -- | Lon: --</p>
                </div>
                <div class="info-card">
                    <span>Altitude</span>
                    <p id="altitude">-- m</p>
                </div>
                <div class="info-card">
                    <span>Humidity</span>
                    <p id="humidity">--%</p>
                </div>
                <div class="info-card">
                    <span>Wind Speed</span>
                    <p id="wind">-- km/h</p>
                </div>
                <div class="info-card">
                    <span>Precipitation</span>
                    <p id="precipitation">-- mm</p>
                </div>
                <div class="info-card">
                    <span>AQI (US Index)</span>
                    <p id="aqi">--</p>
                </div>
                <div class="info-card">
                    <span>Sunrise</span>
                    <p id="sunrise">--:--</p>
                </div>
                <div class="info-card">
                    <span>Sunset</span>
                    <p id="sunset">--:--</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize theme UI state
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            updateThemeButton(savedTheme === 'solarized-dark');
        });

        function toggleTheme() {
            const isSolarized = document.body.classList.toggle('solarized-dark');
            const newTheme = isSolarized ? 'solarized-dark' : 'dark';
            localStorage.setItem('theme', newTheme);
            updateThemeButton(isSolarized);
        }

        function updateThemeButton(isSolarized) {
            const btn = document.getElementById('themeToggleBtn');
            if (!btn) return;
            
            if (isSolarized) {
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0-5a1 1 0 0 1 1 1v2a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 14a1 1 0 0 1 1 1v2a1 1 0 0 1-2 0v-2a1 1 0 0 1 1-1zM5.22 6.64a1 1 0 0 1 0-1.41l1.41-1.41a1 1 0 0 1 1.41 0 1 1 0 0 1 0 1.41L6.64 6.64a1 1 0 0 1-1.41 0zm10.6 10.6a1 1 0 0 1 0-1.41l1.41-1.41a1 1 0 0 1 1.41 0 1 1 0 0 1 0 1.41l-1.41 1.41a1 1 0 0 1-1.41 0zM2 12a1 1 0 0 1 1-1h2a1 1 0 0 1 0 2H3a1 1 0 0 1-1-1zm14 0a1 1 0 0 1 1-1h2a1 1 0 0 1 0 2h-2a1 1 0 0 1-1-1zM6.64 18.78a1 1 0 0 1-1.41 0l-1.41-1.41a1 1 0 0 1 0-1.41 1 1 0 0 1 1.41 0l1.41 1.41a1 1 0 0 1 0 1.41zm10.6-10.6a1 1 0 0 1-1.41 0 1 1 0 0 1 0-1.41l1.41-1.41a1 1 0 0 1 1.41 0 1 1 0 0 1 0 1.41l-1.41 1.41z"/>
                    </svg>
                    <span>Solarized Dark</span>
                `;
                btn.title = "Switch to Dark Mode";
            } else {
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
                    </svg>
                    <span>Dark Mode</span>
                `;
                btn.title = "Switch to Solarized Dark Mode";
            }
        }

        async function getWeather() {
            const cityInput = document.getElementById('cityInput').value;
            const errorMsg = document.getElementById('errorMsg');
            const weatherInfo = document.getElementById('weatherInfo');

            if (!cityInput) return;

            // Reset UI
            errorMsg.style.display = 'none';

            try {
                // Step 1: Geocoding API to get Lat, Lon, Country, and Timezone from City Name
                const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityInput)}&count=1&language=en&format=json`;
                const geoResponse = await fetch(geoUrl);
                const geoData = await geoResponse.json();

                if (!geoData.results || geoData.results.length === 0) {
                    throw new Error("City not found");
                }

                const city = geoData.results[0];
                const lat = city.latitude;
                const lon = city.longitude;
                const cityName = city.name;
                const country = city.country || city.country_code;
                const timezone = city.timezone;

                // Step 2: Fetch Weather and Air Quality Data using coordinates
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m&daily=sunrise,sunset&timezone=${encodeURIComponent(timezone)}`;
                const aqiUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi`;

                // Fetch both concurrently to speed it up
                const [weatherRes, aqiRes] = await Promise.all([fetch(weatherUrl), fetch(aqiUrl)]);
                const weatherData = await weatherRes.json();
                const aqiData = await aqiRes.json();

                // Step 3: Parse and Format Time - fixed typo with hour property definition
                const localTimeStr = new Date().toLocaleTimeString('en-US', { timeZone: timezone, hour: '2-digit', minute: '2-digit' });
                
                // Helper to format API time strings (YYYY-MM-DDTHH:MM) to just HH:MM
                const formatSunTime = (timeStr) => {
                    return timeStr ? timeStr.split('T')[1] : '--:--';
                };

                // Step 4: Inject data into DOM
                document.getElementById('location').innerText = `${cityName}, ${country}`;
                document.getElementById('temperature').innerText = `${Math.round(weatherData.current.temperature_2m)}°C`;
                document.getElementById('currentTime').innerText = `Local Time: ${localTimeStr}`;
                document.getElementById('coords').innerText = `Lat: ${lat.toFixed(2)} | Lon: ${lon.toFixed(2)}`;
                document.getElementById('altitude').innerText = `${weatherData.elevation || 0} m`;
                document.getElementById('humidity').innerText = `${weatherData.current.relative_humidity_2m}%`;
                document.getElementById('wind').innerText = `${weatherData.current.wind_speed_10m} km/h`;
                document.getElementById('precipitation').innerText = `${weatherData.current.precipitation} mm`;
                document.getElementById('aqi').innerText = aqiData.current?.us_aqi || 'N/A';
                document.getElementById('sunrise').innerText = formatSunTime(weatherData.daily.sunrise[0]);
                document.getElementById('sunset').innerText = formatSunTime(weatherData.daily.sunset[0]);

                // Reveal weather information
                weatherInfo.style.display = 'block';

            } catch (error) {
                console.error(error);
                weatherInfo.style.display = 'none';
                errorMsg.style.display = 'block';
            }
        }

        // Allow pressing "Enter" key to search
        document.getElementById('cityInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                getWeather();
            }
        });
    </script>
</body>
</html>
